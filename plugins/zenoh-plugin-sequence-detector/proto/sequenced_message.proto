syntax = "proto3";

package sequenced_message;

// Message format for sequence-tracked messages
//
// This format enables detection of out-of-sequence and missing messages.
// Publishers MUST include this metadata with each message.
//
// Usage:
//   - seq: REQUIRED, monotonically increasing per publisher
//   - publisher_id: REQUIRED, unique and stable identifier
//   - timestamp_ns: OPTIONAL, nanoseconds since UNIX epoch
//   - payload: OPTIONAL, arbitrary binary data
//
// See MESSAGE_FORMAT.md for complete specification and validation rules.
message SequencedMessage {
    // Monotonically increasing sequence number (per publisher)
    // REQUIRED: Must increment by 1 for each message
    uint64 seq = 1;

    // Unique identifier for the message publisher
    // REQUIRED: Must be unique and stable across restarts
    string publisher_id = 2;

    // Timestamp in nanoseconds since UNIX epoch
    // OPTIONAL: Recommended for correlation and debugging
    optional uint64 timestamp_ns = 3;

    // The actual message payload
    // OPTIONAL: Arbitrary binary data (JSON, MessagePack, raw bytes, etc.)
    optional bytes payload = 4;
}
